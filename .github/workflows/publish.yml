name: Publish Packages

on:
  push:
    tags:
      - 'v*'
  # Allow manual re-invocation without moving a tag. Useful for recovery when
  # one publish step failed but the other succeeded — idempotent publishes
  # below let a rerun skip already-published versions without re-publish
  # conflicts (npm returns 403 on attempts to publish over an existing version).
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      id-token: write  # Required for npm provenance
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          # Clean install to handle platform-specific optional dependencies
          rm -rf node_modules packages/*/node_modules
          npm install --prefer-offline

      # Build @ibm/ibmi-mcp-server first so the CLI's typecheck can resolve
      # @ibm/ibmi-mcp-server/{tools,services,context,formatting} subpath exports,
      # which are defined in the server's package.json `exports` map pointing at
      # ./dist/public/*.js. Running typecheck before build causes TS2307 errors
      # on a fresh runner. The root `build` script builds server then CLI.
      - name: Build
        run: npm run build

      - name: Run tests and checks
        run: |
          npm run typecheck --workspaces --if-present
          npm run lint --workspaces --if-present
          npm run test --workspaces --if-present

      - name: Publish @ibm/ibmi-mcp-server to npm
        working-directory: ./packages/server
        run: |
          V=$(node -p "require('./package.json').version")
          if npm view "@ibm/ibmi-mcp-server@$V" version >/dev/null 2>&1; then
            echo "@ibm/ibmi-mcp-server@$V already on registry — skipping publish."
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # npm's registry has propagation delay; @ibm/ibmi-cli exact-pins
      # @ibm/ibmi-mcp-server so the CLI publish will fail with ETARGET unless
      # the server version is already queryable. Poll with a short timeout.
      - name: Wait for @ibm/ibmi-mcp-server on registry
        run: |
          V=$(node -p "require('./packages/server/package.json').version")
          echo "Waiting for @ibm/ibmi-mcp-server@$V to be visible..."
          for i in $(seq 1 30); do
            if npm view "@ibm/ibmi-mcp-server@$V" version > /dev/null 2>&1; then
              echo "Visible after ${i} attempts."
              exit 0
            fi
            sleep 5
          done
          echo "Server version never became visible on registry."
          exit 1

      - name: Publish @ibm/ibmi-cli to npm
        working-directory: ./packages/cli
        run: |
          V=$(node -p "require('./package.json').version")
          if npm view "@ibm/ibmi-cli@$V" version >/dev/null 2>&1; then
            echo "@ibm/ibmi-cli@$V already on registry — skipping publish."
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
