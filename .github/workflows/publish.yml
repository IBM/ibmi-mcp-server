name: Publish Package

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      id-token: write  # Required for npm provenance

    steps:
      # 1. Checkout repository
      - uses: actions/checkout@v4

      # 2. Setup Node.js with npm registry
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # 3. Install dependencies (npm workspaces — installs all packages/*)
      - name: Install dependencies
        run: |
          # Clean install to handle platform-specific optional dependencies
          rm -rf node_modules packages/*/node_modules
          npm install --prefer-offline

      # 4. Run validation across all workspaces
      - name: Run tests and checks
        run: |
          npm run typecheck --workspaces --if-present
          npm run lint --workspaces --if-present
          npm run test --workspaces --if-present

      # 5. Build the workspace packages
      - name: Build
        run: npm run build --workspaces --if-present

      # 6. Publish server to npm (using granular access token with 2FA bypass)
      - name: Publish @ibm/ibmi-mcp-server to npm
        working-directory: ./packages/server
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
